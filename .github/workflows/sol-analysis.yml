name: SOL 均值回归挂单分析

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  analyze:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - uses: actions/checkout@v4
      
      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: 安装依赖
        run: pip install ccxt pandas numpy
      
      - name: 运行分析
        run: python sol_analyzer.py
      
      - name: 提交更新
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "🔄 更新 SOL 挂单分析报告 $(date '+%Y-%m-%d %H:%M:%S')" || echo "No changes"
          git push
