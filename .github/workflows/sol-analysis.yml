name: SOL 量化分析

on:
  schedule:
    - cron: '*/30 * * * *'     # 每30分钟一次，推荐先用这个
  workflow_dispatch:

jobs:
  analyze:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - uses: actions/checkout@v4
      
      - name: 设置 Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: 安装依赖
        run: pip install -r requirements.txt
      
      - name: 运行分析程序
        run: python sol_analyzer.py
      
      - name: 提交更新
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "🔄 自动更新 SOL 分析报告 $(date '+ %Y-%m-%d %H:%M:%S')" || echo "No changes to commit"
          git push
